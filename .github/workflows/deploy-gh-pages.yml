name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Install deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Inject API base
        working-directory: frontend
        env:
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL }}
        run: |
          mkdir -p public
          if [ -z "$HF_SPACE_URL" ]; then
            echo "HF_SPACE_URL is required for GitHub Pages"
            exit 1
          fi
          BASE_TRIMMED="${HF_SPACE_URL%/}"
          printf "window.__API_BASE__ = \"%s\";" "$BASE_TRIMMED" > public/api-base.js

      - name: Build
        working-directory: frontend
        run: pnpm build

      - name: Deploy
        run: |
          mkdir gh-pages
          cp -r frontend/dist/* gh-pages/

          cd gh-pages
          touch .nojekyll

          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "deploy: $GITHUB_SHA"

          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      DIESW_ASSETS_DIR: ${{ github.workspace }}/.cache/diesw-assets
      VITE_GISCUS_REPO: ${{ vars.VITE_GISCUS_REPO }}
      VITE_GISCUS_REPO_ID: ${{ vars.VITE_GISCUS_REPO_ID }}
      VITE_GISCUS_CATEGORY: ${{ vars.VITE_GISCUS_CATEGORY }}
      VITE_GISCUS_CATEGORY_ID: ${{ vars.VITE_GISCUS_CATEGORY_ID }}
      VITE_GISCUS_MAPPING: ${{ vars.VITE_GISCUS_MAPPING }}
      VITE_GISCUS_STRICT: ${{ vars.VITE_GISCUS_STRICT }}
      VITE_GISCUS_REACTIONS_ENABLED: ${{ vars.VITE_GISCUS_REACTIONS_ENABLED }}
      VITE_GISCUS_INPUT_POSITION: ${{ vars.VITE_GISCUS_INPUT_POSITION }}
      VITE_GISCUS_THEME: ${{ vars.VITE_GISCUS_THEME }}
      VITE_GISCUS_LANG: ${{ vars.VITE_GISCUS_LANG }}

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout assets repository
        uses: actions/checkout@v4
        with:
          repository: dieWehmut/diesw-assets
          token: ${{ secrets.DIESW_ASSETS_TOKEN }}
          path: .cache/diesw-assets

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 调试时可开启，确认变量是否注入成功
      # - name: Debug env
      #   run: |
      #     echo "REPO=$VITE_GISCUS_REPO"
      #     echo "THEME=$VITE_GISCUS_THEME"

      - name: Build
        run: pnpm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

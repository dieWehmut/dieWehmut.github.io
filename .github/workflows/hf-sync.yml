name: Sync to HuggingFace Space

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/hf-sync.yml'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

          if [ -z "$HF_SPACE_URL" ]; then
            echo "HF_SPACE_URL is required"
            exit 1
          fi
          if [ -z "$HF_USERNAME" ]; then
            echo "HF_USERNAME is required"
            exit 1
          fi

          SPACE_URL="${HF_SPACE_URL#https://}"
          SPACE_URL="${SPACE_URL#http://}"

          git clone "https://$HF_USERNAME:$HF_TOKEN@$SPACE_URL" hf-space

          rsync -av --delete \
            --exclude ".git" \
            backend/ hf-space/

          cd hf-space

          git add .
          git commit -m "sync from github" || echo "No changes"
          git push

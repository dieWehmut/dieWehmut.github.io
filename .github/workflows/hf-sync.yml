name: Sync to HuggingFace Space

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/hf-sync.yml'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL }}
          HF_SPACE_GIT_URL: ${{ secrets.HF_SPACE_GIT_URL }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

          if [ -n "$HF_SPACE_GIT_URL" ]; then
            SPACE_URL="${HF_SPACE_GIT_URL#https://}"
            SPACE_URL="${SPACE_URL#http://}"
          else
            if [ -z "$HF_SPACE_URL" ]; then
              echo "HF_SPACE_URL is required when HF_SPACE_GIT_URL is not set"
              exit 1
            fi
            if [[ "$HF_SPACE_URL" == *huggingface.co/spaces/* ]]; then
              SPACE_URL="${HF_SPACE_URL#https://}"
              SPACE_URL="${SPACE_URL#http://}"
            else
              echo "HF_SPACE_GIT_URL is required when HF_SPACE_URL is not a huggingface.co/spaces URL"
              exit 1
            fi
          fi

          git clone "https://oauth2:$HF_TOKEN@$SPACE_URL" hf-space

          rsync -av --delete \
            --exclude ".git" \
            backend/ hf-space/

          cd hf-space

          git add .
          git commit -m "sync from github" || echo "No changes"
          git push

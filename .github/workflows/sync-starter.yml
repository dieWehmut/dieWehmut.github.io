name: Sync Starter Template

on:
  push:
    branches: [main]

jobs:
  sync-starter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check starter token
        env:
          STARTER_PUSH_TOKEN: ${{ secrets.STARTER_PUSH_TOKEN }}
        run: |
          if [ -z "$STARTER_PUSH_TOKEN" ]; then
            echo "STARTER_PUSH_TOKEN is not set." >&2
            exit 1
          fi

      - name: Prepare template
        run: |
          set -e

          # Remove files that should not be in the template
          rm -rf prompt/ sample/ dist/ public/capture-assets/ .env.local .claude/ .githooks/
          rm -f CAPTURE.md scripts/sync-assets-repo.mjs scripts/checkout-assets-repo.mjs

          # --- Use generic package metadata for the template ---
          node --input-type=module << 'EOF'
          import fs from 'node:fs'

          function writeJson(filePath, data) {
            fs.writeFileSync(filePath, `${JSON.stringify(data, null, 2)}\n`)
          }

          const packagePath = 'package.json'
          const packageJson = JSON.parse(fs.readFileSync(packagePath, 'utf8'))
          packageJson.name = 'diesuwa-starter'
          if (packageJson.scripts) delete packageJson.scripts['assets:push']
          writeJson(packagePath, packageJson)

          const packageLockPath = 'package-lock.json'
          if (fs.existsSync(packageLockPath)) {
            const packageLock = JSON.parse(fs.readFileSync(packageLockPath, 'utf8'))
            packageLock.name = 'diesuwa-starter'
            if (packageLock.packages?.['']) packageLock.packages[''].name = 'diesuwa-starter'
            writeJson(packageLockPath, packageLock)
          }
          EOF

          # --- Ensure MIT license is present in the template ---
          cat > LICENSE << 'EOF'
          MIT License

          Copyright (c) 2026 dieWehmut

          Permission is hereby granted, free of charge, to any person obtaining a copy
          of this software and associated documentation files (the "Software"), to deal
          in the Software without restriction, including without limitation the rights
          to use, copy, modify, merge, publish, distribute, sublicense, and/or sell
          copies of the Software, and to permit persons to whom the Software is
          furnished to do so, subject to the following conditions:

          The above copyright notice and this permission notice shall be included in all
          copies or substantial portions of the Software.

          THE SOFTWARE IS PROVIDED "AS IS", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR
          IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY,
          FITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE
          AUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER
          LIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM,
          OUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE
          SOFTWARE.
          EOF

          # --- Use the starter-readme.md as the template README ---
          cp src/data/site/starter-readme.md README.md

          # --- Replace config.ts with placeholder values ---
          cat > src/data/site/config.ts << 'CONFIGEOF'
          import type { SiteConfig } from '../../types/content'

          type CodeRunnerEnv = {
            VITE_CODE_RUNNER_MODE?: 'frontend' | 'backend'
            VITE_CODE_RUNNER_API_URL?: string
            VITE_CODE_RUNNER_API_TOKEN?: string
          }

          const viteEnv = (import.meta.env || {}) as CodeRunnerEnv
          const processEnv = typeof process === 'undefined' ? {} : process.env
          const configuredRunnerMode = viteEnv.VITE_CODE_RUNNER_MODE || processEnv.VITE_CODE_RUNNER_MODE

          /**
           * Site-wide personal configuration.
           * All personal / private data is centralized here.
           * ⚠️  Modify this file to personalize your site.
           */

          export const siteConfig: SiteConfig = {
            // --- Identity ---
            githubUser: 'your-github-username',
            githubRepo: 'your-github-username.github.io',
            owner: 'your-name',
            displayName: 'your-name',
            email: 'you@example.com',

            // --- Site Meta ---
            title: 'my-nexus',
            subtitle: 'my-nexus',
            description: 'Hi! This is my personal site.',
            siteUrl: 'https://your-github-username.github.io/your-repo/',
            startedAt: '2026-05-01T00:00:00+08:00',

            // --- External Services ---
            googleAnalyticsId: '',

            // --- ICP Filing (optional, set empty to hide) ---
            icpNumber: '',
            icpText: '',

            // --- Feature Flags (set false to hide page & nav entry) ---
            enableInfra: false,
            enableProject: false,

            // --- Code Runner ---
            codeRunner: {
              mode: configuredRunnerMode === 'backend' ? 'backend' : 'frontend',
              backendApiUrl: viteEnv.VITE_CODE_RUNNER_API_URL || processEnv.VITE_CODE_RUNNER_API_URL || '',
              backendToken: viteEnv.VITE_CODE_RUNNER_API_TOKEN || processEnv.VITE_CODE_RUNNER_API_TOKEN || '',
            },

            // --- Social Links ---
            links: [
              { label: 'GitHub', url: 'https://github.com/your-github-username' },
              { label: 'Website', url: 'https://your-github-username.github.io/your-repo/' },
            ],
          }

          export default siteConfig
          CONFIGEOF

          # --- Replace about.md with example ---
          cat > src/data/site/about.md << 'ABOUTEOF'
          ## About This Site

          This site is built with the [diesuwa-starter](https://github.com/dieWehmut/diesuwa-starter) template.

          - Template demo: [https://diewehmut.github.io/diesuwa-starter/](https://diewehmut.github.io/diesuwa-starter/)
          - Production demo: [https://diewehmut.github.io/](https://diewehmut.github.io/)

          ## Copyright

          All content on this site is subject to a CC-BY-NC license unless otherwise stated.
          ABOUTEOF

          # --- Replace data files with example content ---
          cat > src/data/site/friends.ts << 'EOF'
          import type { FriendLink } from '../../types/content'

          export const friends: FriendLink[] = [
            {
              id: 'nexus-author',
              name: 'diesw',
              description: 'diesuwa-starter template author',
              url: 'https://diewehmut.github.io/',
              avatar: 'https://avatars.githubusercontent.com/dieWehmut',
            },
            // Add your friend links here:
            // {
            //   id: 'friend-1',
            //   name: 'Friend Name',
            //   description: 'A short description',
            //   url: 'https://friend-site.com',
            //   avatar: 'https://avatars.githubusercontent.com/friend-username',
            // },
          ]
          EOF

          cat > src/data/site/app.ts << 'EOF'
          import { ref } from 'vue'

          export const apps = ref([
            {
              name: 'Apps',
              autoLoad: true,
              description: 'Static apps list',
              manualItems: [
                // Add your apps here
              ],
            },
          ])

          export default apps
          EOF

          cat > src/data/site/game.ts << 'EOF'
          import { ref } from 'vue'

          export const games = ref([
            {
              name: 'Games',
              autoLoad: true,
              description: 'Static games list',
              manualItems: [
                // Add your game projects here
              ],
            },
          ])

          export default games
          EOF

          cat > src/data/site/infra.ts << 'EOF'
          import { ref } from 'vue'

          const initialInfra = [
            // Add your infrastructure endpoints here
            // { name: 'Service Name', key: 'service', url: 'https://service.example.com', date: '2025-01-01' },
          ]

          initialInfra.sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime())

          export const infra = ref(initialInfra)

          export default infra
          EOF

          cat > src/data/site/page.ts << 'EOF'
          import { ref } from 'vue'

          export const pages = ref([
            // Add your website projects here
          ])

          export default pages
          EOF

          cat > src/data/site/tool.ts << 'EOF'
          import { ref } from 'vue'
          import { siteConfig } from './config'

          export const tools = ref([
            {
              name: 'Tools',
              autoLoad: true,
              owner: siteConfig.githubUser,
              repo: '',
              description: 'Static tools list',
              manualItems: [
                // Add your tool projects here
              ],
            },
          ])

          export default tools
          EOF

          # --- Replace docs with a sample post ---
          rm -rf src/data/docs/notes/*.md src/data/docs/posts/*.md

          cat > src/data/docs/posts/hello-world.md << 'EOF'
          ---
          title: Hello World
          date: 2026-05-01
          tags: [intro, welcome]
          ---

          # Hello World

          Welcome to your new diesuwa-starter site! Edit or replace this post to get started.

          ## Markdown Features

          This template supports full GitHub-flavored Markdown:

          - **Bold**, *italic*, ~~strikethrough~~
          - `inline code` and fenced code blocks with syntax highlighting
          - [Links](https://github.com), images, tables
          - Blockquotes, task lists, details/summary

          ### Math Support

          Inline math: $E = mc^2$

          Display math:

          $$
          \sum_{n=1}^{\infty} \frac{1}{n^2} = \frac{\pi^2}{6}
          $$

          ### Code Block

          ```javascript
          function greet(name) {
            console.log(`Hello, ${name}!`)
          }
          ```
          EOF

          latest_commit_date="$(git log -1 --format=%cI)"
          {
            cat << EOF
          ---
          title: 开发日志
          date: ${latest_commit_date}
          tags: [devlog, commit]
          ---

          # 开发日志

          本文档由导出流程根据仓库 commit 历史自动生成，日期取最新 commit 时间。

          EOF
            git log --date=iso-strict --pretty=format:'- `%h` %cI - %s'
            printf '\n'
          } > src/data/docs/posts/development-log.md

          cat > src/data/docs/notes/sample-note.md << 'EOF'
          ---
          title: Sample Note
          date: 2026-05-01
          tags: [note]
          type: note
          ---

          This is a sample note. Replace it with your own content.
          EOF

          # --- Reset capture data for the template ---
          cat > src/data/capture/manifest.json << 'EOF'
          []
          EOF

          cat > src/data/capture/generated.ts << 'EOF'
          import type { CaptureAsset } from '../../types/content'

          export const generatedCaptureAssets: CaptureAsset[] = [] as CaptureAsset[]

          export default generatedCaptureAssets
          EOF

          # --- Replace deploy workflow with a template-friendly GitHub Pages workflow ---
          cat > .github/workflows/deploy.yml << 'EOF'
          name: Deploy to GitHub Pages

          on:
            push:
              branches: [main]
            workflow_dispatch:

          permissions:
            contents: read
            pages: write
            id-token: write

          concurrency:
            group: pages
            cancel-in-progress: true

          jobs:
            build-and-deploy:
              runs-on: ubuntu-latest

              env:
                VITE_CODE_RUNNER_MODE: ${{ '${{ vars.VITE_CODE_RUNNER_MODE }}' }}
                VITE_CODE_RUNNER_API_URL: ${{ '${{ vars.VITE_CODE_RUNNER_API_URL }}' }}
                VITE_CODE_RUNNER_API_TOKEN: ${{ '${{ vars.VITE_CODE_RUNNER_API_TOKEN }}' }}

              environment:
                name: github-pages

              steps:
                - name: Checkout
                  uses: actions/checkout@v4

                - name: Setup pnpm
                  uses: pnpm/action-setup@v4
                  with:
                    version: 9

                - name: Setup Node.js
                  uses: actions/setup-node@v4
                  with:
                    node-version: 20
                    cache: pnpm

                - name: Install dependencies
                  run: pnpm install --frozen-lockfile

                - name: Build
                  shell: bash
                  run: |
                    repo_name="${GITHUB_REPOSITORY#*/}"
                    if [ "$repo_name" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
                      export BASE_PATH="/"
                    else
                      export BASE_PATH="/${repo_name}/"
                    fi
                    export VITE_CODE_RUNNER_MODE="${VITE_CODE_RUNNER_MODE:-frontend}"
                    echo "BASE_PATH=$BASE_PATH"
                    echo "VITE_CODE_RUNNER_MODE=$VITE_CODE_RUNNER_MODE"
                    pnpm run build

                - name: Setup Pages
                  uses: actions/configure-pages@v4

                - name: Upload artifact
                  uses: actions/upload-pages-artifact@v3
                  with:
                    path: dist

                - name: Deploy to GitHub Pages
                  id: deploy
                  uses: actions/deploy-pages@v4
          EOF

          # --- Create docs/ folder with translated READMEs ---
          mkdir -p docs
          cp src/data/site/starter-readme.zh-TW.md docs/README.zh-TW.md
          cp src/data/site/starter-readme.en.md docs/README.en.md
          cp src/data/site/starter-readme.ja.md docs/README.ja.md

          # --- Remove the starter-readme source files from template ---
          rm -f src/data/site/starter-readme.md
          rm -f src/data/site/starter-readme.zh-TW.md
          rm -f src/data/site/starter-readme.en.md
          rm -f src/data/site/starter-readme.ja.md

          # --- Remove private sync workflows from the template ---
          rm -f .github/workflows/sync-starter.yml
          rm -f .github/workflows/sync-capture.yml

      - name: Push to starter repo
        env:
          STARTER_PUSH_TOKEN: ${{ secrets.STARTER_PUSH_TOKEN }}
        run: |
          set -e
          git config --global user.email "diesehnsucht0@gmail.com"
          git config --global user.name "dieWehmut"
          tmp_dir=$(mktemp -d)
          git clone --depth 1 "https://x-access-token:${STARTER_PUSH_TOKEN}@github.com/dieWehmut/diesuwa-starter.git" "$tmp_dir"
          rsync -a --delete --exclude='.git' ./ "$tmp_dir"/
          cd "$tmp_dir"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to push."
            exit 0
          fi
          git commit -m "sync: update starter template"
          git push origin main --force

<!DOCTYPE html>
<html lang="zh-cn" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="https://github.com/dieWehmut.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        var theme = 'dark';
        try {
          var saved = localStorage.getItem('theme');
          if (saved === 'light' || saved === 'dark') {
            theme = saved;
          }
        } catch (error) {}

        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <title>diesw-nexus</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TZG91QDSZ5"></script>

      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);} 
      gtag('js', new Date());
      gtag('config', 'G-TZG91QDSZ5', { anonymize_ip: true });
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
